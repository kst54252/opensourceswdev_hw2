name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  build-and-push:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/human-pose-estimation:latest

      - name: Deploy and Run Container Locally
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/human-pose-estimation:latest
          docker stop pose-api-container || true
          docker rm pose-api-container || true
          docker run -d --name pose-api-container -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/human-pose-estimation:latest
