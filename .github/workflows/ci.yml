name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: self-hosted
    
    steps:
      - name: Check out the repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/human-pose-estimation:latest

      - name: Deploy and Run Container Locally
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/human-pose-estimation:latest
          docker stop pose-api-container || true
          docker rm pose-api-container || true
          docker run -d --name pose-api-container -p 8000:8000 --restart unless-stopped ${{ secrets.DOCKER_USERNAME }}/human-pose-estimation:latest
